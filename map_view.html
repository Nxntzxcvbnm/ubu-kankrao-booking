<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UBU Club Booking - แผนที่จุดเช็คอิน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .map-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 24px;
        }

        .map-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .map-header h1 {
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .map-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .map-frame-wrapper {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-lg);
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            height: 60vh;
            min-height: 400px;
        }

        .map-frame-wrapper iframe {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-md);
            border: none;
            background: #f0f0f0;
        }

        .back-nav {
            margin-top: 24px;
            text-align: center;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>

<body>
    <!-- ========== NAVBAR ========== -->
    <nav class="user-bar" style="justify-content:center;">
        <div class="user-bar-left">
            <img src="logo.png" alt="Club Logo"
                style="height:48px; width:auto; border-radius:6px; background:white; padding:4px;">
            <span style="font-size:18px; font-weight:600;">UBU Club Booking</span>
        </div>
    </nav>

    <!-- ========== MAP SECTION ========== -->
    <div class="map-container">
        <div class="map-header">
            <h1>📍 พิกัดจุดเช็คอิน</h1>
            <p>อาคารกิจกรรมนักศึกษา มหาวิทยาลัยอุบลราชธานี<br />(กรุณาอยู่ในรัศมี 200 เมตร เพื่อเช็คอินผ่านระบบจอง)</p>
        </div>

        <div class="map-frame-wrapper">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1933.3421544321706!2d104.905052!3d15.1237685!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x311685c37c211c87%3A0x8828f5f2fa28f31!2z4Lit4Liy4LiE4Liy4Lij4LiB4Li04LiI4LiB4Lij4Lij4Lih4LiZ4Lix4LiB4Lio4Li24LiB4Lip4LiyIOC4hS7guK3guLjguJrguKU!5e0!3m2!1sth!2sth!4v1711718000000!5m2!1sth!2sth"
                allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div class="back-nav">
            <a href="index.html" class="btn-back">⬅️ กลับหน้าหลัก</a>
        </div>
    </div>

    <!-- ========== FOOTER ========== -->
    <footer style="text-align:center;padding:30px 24px;font-size:13px;color:#9CA3AF; margin-top: auto;">
        <p>© 2026 มหาวิทยาลัยอุบลราชธานี · สร้างเพื่อนักศึกษา UBU</p>
    </footer>
</body>

</html>
